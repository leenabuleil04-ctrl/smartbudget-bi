{% extends 'base.html' %}
{% block content %}

<style>
  .budget-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 2rem;
    max-width: 600px;
  }
  .budget-card h2 {
    color: #012a4a;
    margin: 0 0 .4rem;
  }
  .budget-card .subtitle {
    color: #6b7280;
    font-size: 0.9rem;
    margin: 0 0 2rem;
  }

  .budget-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .budget-row label {
    width: 130px;
    flex-shrink: 0;
    font-weight: 600;
    color: #374151;
    font-size: 0.9rem;
  }
  .budget-input {
    flex: 1;
    position: relative;
  }
  .budget-input span {
    position: absolute;
    left: .75rem;
    top: 50%;
    transform: translateY(-50%);
    color: #6b7280;
    font-size: 0.9rem;
    pointer-events: none;
  }
  .budget-input input {
    width: 100%;
    padding: .5rem .75rem .5rem 1.75rem;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.95rem;
    color: #111827;
    box-sizing: border-box;
    transition: border-color .15s;
  }
  .budget-input input:focus {
    outline: none;
    border-color: #0fb5a3;
    box-shadow: 0 0 0 3px rgba(15,181,163,.15);
  }

  .divider {
    border: none;
    border-top: 1px solid #f3f4f6;
    margin: 1.5rem 0;
  }

  .btn-save {
    background: #012a4a;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: .65rem 2rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-save:hover { background: #0fb5a3; }
</style>

<div class="budget-card">
  <h2>Monthly Budget Goals</h2>
  <p class="subtitle">Set a spending limit (₪) per category for this month. Leave blank to skip a category.</p>

  <form method="POST" action="{{ url_for('budget') }}">
    {% for cat in categories %}
    <div class="budget-row">
      <label for="cat_{{ cat }}">{{ cat }}</label>
      <div class="budget-input">
        <span>₪</span>
        <input
          type="number"
          id="cat_{{ cat }}"
          name="{{ cat }}"
          min="0"
          step="0.01"
          placeholder="0.00"
          value="{{ goals.get(cat, '') }}"
        >
      </div>
    </div>
    {% endfor %}

    <hr class="divider">
    <button type="submit" class="btn-save">Save Budget Goals</button>
  </form>
</div>

{% endblock %}
