{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Import Transactions</h2>
  <p>Upload your CSV file here (CSV only for MVP).</p>
  <form method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept=".csv" />
    <button class="btn" type="submit">Upload</button>
  </form>
</div>
{% endblock %}
